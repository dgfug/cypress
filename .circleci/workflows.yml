base-internal-bullseye: cypress/base-internal:22.18.0-bullseye
base-internal-minimum-node: cypress/base-internal:22.15.1
base-internal-yarn-berry: cypress/base-internal:22.18.0-yarn-berry
chrome-beta-version: 141.0.7390.30
chrome-stable-version: 140.0.7339.207
commands:
  build-and-package-binary:
    steps:
      - run:
          command: |
            set -e
            NEEDS_CODE_SIGNING_WINDOWS=`node -p 'process.platform === "win32"'`
            NEEDS_CODE_SIGNING_MAC=`node -p 'process.platform === "darwin"'`

            if [[ "$NEEDS_CODE_SIGNING_MAC" == "true" ]]; then
              echo "Checking for required environment variables..."
              if [ -z "$CSC_LINK" ]; then
                echo "Need to provide environment variable CSC_LINK"
                echo "with base64 encoded certificate .p12 file"
                exit 1
              fi
              if [ -z "$CSC_KEY_PASSWORD" ]; then
                echo "Need to provide environment variable CSC_KEY_PASSWORD"
                echo "with password for unlocking certificate .p12 file"
                exit 1
              fi
              echo "Succeeded."
            elif [[ "$NEEDS_CODE_SIGNING_WINDOWS" == "true" ]]; then
              echo "Checking for required environment variables..."
              if [ -z "$WINDOWS_SIGN_USER_NAME" ]; then
                echo "Need to provide environment variable WINDOWS_SIGN_USER_NAME"
                echo "with password for fetching and signing certificate"
                exit 1
              fi
              if [ -z "$WINDOWS_SIGN_USER_PASSWORD" ]; then
                echo "Need to provide environment variable WINDOWS_SIGN_USER_PASSWORD"
                echo "for fetching and signing certificate"
                exit 1
              fi
              if [ -z "$WINDOWS_SIGN_CREDENTIAL_ID" ]; then
                echo "Need to provide environment variable WINDOWS_SIGN_CREDENTIAL_ID"
                echo "for identifying certificate"
                exit 1
              fi
              if [ -z "$WINDOWS_SIGN_USER_TOTP" ]; then
                echo "Need to provide environment variable WINDOWS_SIGN_USER_TOTP"
                echo "for signing certificate"
                exit 1
              fi
              echo "Succeeded."
            else
              echo "Not code signing for this platform"
            fi
          name: Check environment variables before code sign (if on Mac/Windows)
      - run:
          command: |
            source ./scripts/ensure-node.sh
            node --version
            if [[ `node ./scripts/get-platform-key.js` == 'linux-arm64' ]]; then
              # these are missing on Circle and there is no way to pre-install them on Arm
              sudo apt-get update
              sudo apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb
              DISABLE_SNAPSHOT_REQUIRE=1 yarn binary-build --version $(node ./scripts/get-next-version.js)
            else
              yarn binary-build --version $(node ./scripts/get-next-version.js)
            fi
          name: Build the Cypress binary
          no_output_timeout: 45m
      - run:
          command: |
            source ./scripts/ensure-node.sh
            node --version
            if [[ `node ./scripts/get-platform-key.js` == 'linux-arm64' ]]; then
              # these are missing on Circle and there is no way to pre-install them on Arm
              sudo apt-get update
              sudo apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb
              DISABLE_SNAPSHOT_REQUIRE=1 yarn binary-package --version $(node ./scripts/get-next-version.js)
            else
              yarn binary-package --version $(node ./scripts/get-next-version.js)
            fi
          environment:
            DEBUG: electron-builder,electron-osx-sign*,electron-notarize*
          name: Package the Cypress binary
          no_output_timeout: 45m
      - run:
          command: |
            source ./scripts/ensure-node.sh
            node --version
            yarn binary-smoke-test --version $(node ./scripts/get-next-version.js)
          name: Smoke Test the Cypress binary
      - run:
          command: |
            if [[ $PLATFORM == 'linux' ]]; then
              # on Arm, CI runs as non-root, on x64 CI runs as root but there is no sudo binary
              if [[ `whoami` == 'root' ]]; then
                apt-get update && apt-get install -y zip
              else
                sudo apt-get update && sudo apt-get install -y zip
              fi
            fi
            source ./scripts/ensure-node.sh
            yarn binary-zip
          name: Zip the binary
      - persist_to_workspace:
          paths:
            - cypress/cypress.zip
          root: ~/
  build-and-persist:
    description: Save entire folder as artifact for other jobs to run without reinstalling
    steps:
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn gulp syncCloudValidations
          name: Sync Cloud Validations
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn build
          name: Build packages
      - run:
          command: |
            source ./scripts/ensure-node.sh
            # Minification takes some time. We only really need to do that for the binary (and we regenerate snapshots separately there)
            V8_UPDATE_METAFILE=1 V8_SNAPSHOT_DISABLE_MINIFY=1 yarn build-v8-snapshot-prod
          name: Generate v8 snapshot
      - prepare-modules-cache
      - persist_to_workspace:
          paths:
            - cypress
          root: ~/
  build-better-sqlite3:
    description: Build better-sqlite3 for glibc 2.31
    steps:
      - setup_remote_docker
      - run:
          command: |
            if [[ ! -f better_sqlite3.node ]]; then
              set -x
              apt update && apt install -y docker.io
              docker run -d --name better-sqlite3-builder cypress/base-internal:22.18.0-glibc-2.31 /bin/bash -c "sleep 1000000000"
              docker cp ~/cypress/node_modules/better-sqlite3 better-sqlite3-builder:/better-sqlite3
              docker exec -it better-sqlite3-builder /bin/bash -c "cd /better-sqlite3 && source /root/.bashrc && chown -R root:root . && npm install --ignore-scripts && npx --no-install prebuild -r electron -t 36.8.1 --include-regex 'better_sqlite3.node$'"
              docker cp better-sqlite3-builder:/better-sqlite3/build/Release/better_sqlite3.node ~/cypress/node_modules/better-sqlite3/build/Release/better_sqlite3.node
              docker rm -f better-sqlite3-builder
              cp ~/cypress/node_modules/better-sqlite3/build/Release/better_sqlite3.node ~/cypress/better_sqlite3.node
            else
              cp ~/cypress/better_sqlite3.node ~/cypress/node_modules/better-sqlite3/build/Release/better_sqlite3.node
            fi
          name: Build better-sqlite3 for glibc 2.31
      - save_cache:
          key: better-sqlite3-{{ checksum "node_modules/better-sqlite3/package.json" }}-{{
            checksum "node_modules/electron/package.json" }}
          paths:
            - better_sqlite3.node
      - run:
          command: |
            rm ~/cypress/better_sqlite3.node
          name: Clean up top level better-sqlite3 file
  build-cypress-npm-package:
    parameters:
      executor:
        default: cy-doc
        type: executor
    steps:
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn get-next-version --npm
          name: Bump NPM version
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn lerna run build-cli
          name: Build NPM package
      - run:
          command: ls -la types
          working_directory: cli/build
      - run:
          command: ls -la vue mount-utils react
          working_directory: cli/build
      - unless:
          condition:
            equal:
              - environment:
                  PLATFORM: windows
                machine:
                  image: windows-server-2022-gui:stable
                  shell: bash.exe -eo pipefail
                resource_class: windows.large
              - << parameters.executor >>
          steps:
            - run:
                command: |
                  source ./scripts/ensure-node.sh
                  yarn workspace cypress size
                name: list NPM package contents
      - run:
          command: yarn pack --filename ../../cypress.tgz
          name: pack NPM package
          working_directory: cli/build
      - run:
          command: ls -l
          name: list created NPM package
      - persist_to_workspace:
          paths:
            - cypress/cypress.tgz
          root: ~/
  caching-dependency-installer:
    description: Installs & caches the dependencies based on yarn lock & package
      json dependencies
    parameters:
      build-better-sqlite3:
        default: false
        type: boolean
      only-cache-for-root-user:
        default: false
        type: boolean
    steps:
      - install_cache_helpers_dependencies
      - run:
          command: node scripts/circle-cache.js --action cacheKey > circle_cache_key
          name: Generate Circle Cache Key
      - run:
          command: node ./scripts/get-platform-key.js > platform_key
          name: Generate platform key
      - when:
          condition: <<parameters.build-better-sqlite3>>
          steps:
            - restore_cache:
                key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
                  }}-state-of-node-modules-cache-{{ checksum "circle_cache_key"
                  }}-better-sqlite3
                name: Restore cache state, to check for known modules cache existence
      - unless:
          condition: <<parameters.build-better-sqlite3>>
          steps:
            - restore_cache:
                key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
                  }}-state-of-node-modules-cache-{{ checksum "circle_cache_key"
                  }}
                name: Restore cache state, to check for known modules cache existence
      - run:
          command: |
            if [[ -f "node_modules_installed" ]]; then
              echo "Node modules already cached for dependencies, exiting"
              circleci-agent step halt
            fi
          name: Bail if cache exists
      - run: date +%Y-%U > cache_date
      - restore_cache:
          keys:
            - v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum
              "platform_key" }}-deps-root-weekly-{{ checksum "cache_date" }}
          name: Restore weekly yarn cache
      - run:
          command: |
            if [[ `node ./scripts/get-platform-key.js` == 'linux-arm64' ]]; then
              # Building better-sqlite3 on arm64 requires gcc-10
              # on Arm, CI runs as non-root so we need to use sudo
              sudo apt install gcc-10 g++-10

              # Update default to gcc-10 and g++-10
              sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 30
              sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 30
              sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc 30
              sudo update-alternatives --set cc /usr/bin/gcc
              sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++ 30
              sudo update-alternatives --set c++ /usr/bin/g++
              sudo update-alternatives --config gcc
              sudo update-alternatives --config g++

              # If we are on arm64 we need to install setuptools as it no longer comes standard with the latest version of python
              pip install setuptools
            fi
            source ./scripts/ensure-node.sh
            # avoid installing Percy's Chromium every time we use @percy/cli
            # https://docs.percy.io/docs/caching-asset-discovery-browser-in-ci
            PERCY_POSTINSTALL_BROWSER=true \
            yarn --prefer-offline --frozen-lockfile --cache-folder ~/.yarn
          name: Install Node Modules
          no_output_timeout: 20m
      - when:
          condition: <<parameters.build-better-sqlite3>>
          steps:
            - build-better-sqlite3
      - prepare-modules-cache:
          dont-move: <<parameters.only-cache-for-root-user>>
      - when:
          condition: <<parameters.only-cache-for-root-user>>
          steps:
            - save_cache:
                key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
                  }}-node-modules-cache-{{ checksum "circle_cache_key" }}
                name: Saving node modules for root, cli, and all globbed workspace packages
                paths:
                  - node_modules
                  - cli/node_modules
                  - system-tests/node_modules
                  - globbed_node_modules
      - unless:
          condition: <<parameters.only-cache-for-root-user>>
          steps:
            - save_cache:
                key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
                  }}-node-modules-cache-{{ checksum "circle_cache_key" }}
                name: Saving node modules for root, cli, and all globbed workspace packages
                paths:
                  - /tmp/node_modules_cache
      - run: touch node_modules_installed
      - when:
          condition: <<parameters.build-better-sqlite3>>
          steps:
            - save_cache:
                key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
                  }}-state-of-node-modules-cache-{{ checksum "circle_cache_key"
                  }}-better-sqlite3
                name: Saving node-modules cache state key
                paths:
                  - node_modules_installed
      - unless:
          condition: <<parameters.build-better-sqlite3>>
          steps:
            - save_cache:
                key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
                  }}-state-of-node-modules-cache-{{ checksum "circle_cache_key"
                  }}
                name: Saving node-modules cache state key
                paths:
                  - node_modules_installed
      - save_cache:
          key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
            }}-deps-root-weekly-{{ checksum "cache_date" }}
          name: Save weekly yarn cache
          paths:
            - ~/.yarn
            - ~/.cy-npm-cache
  check-if-binary-exists:
    steps:
      - run-on-dependencies:
          command: build
          package: internal-scripts
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn gulp e2eTestScaffold
            yarn check-binary-on-cdn --version $(node ./scripts/get-next-version.js) --type binary --file cypress.zip
          name: Check if binary exists, exit if it does
  clone-repo-and-checkout-branch:
    description: |
      Clones an external repo and then checks out the branch that matches the next version otherwise uses 'master' branch.
    parameters:
      pull_request_id:
        default: 0
        description: Pull request number to check out before installing and testing
        type: integer
      repo:
        description: 'Name of the github repo to clone like: cypress-example-kitchensink'
        type: string
    steps:
      - restore_cached_binary
      - run:
          command: |
            git clone --depth 1 --no-single-branch https://github.com/cypress-io/<<parameters.repo>>.git .

            cd ~/cypress/..
            # install some deps for get-next-version
            npm i semver@7.3.2 conventional-recommended-bump@6.1.0 conventional-changelog-angular@5.0.12 minimist@1.2.5
            NEXT_VERSION=$(node ./cypress/scripts/get-next-version.js)
            cd -

            git checkout $NEXT_VERSION || true
          name: 'Cloning test project and checking out release branch:
            <<parameters.repo>>'
          working_directory: /tmp/<<parameters.repo>>
      - when:
          condition: <<parameters.pull_request_id>>
          steps:
            - run:
                command: |
                  git fetch origin pull/<<parameters.pull_request_id>>/head:pr-<<parameters.pull_request_id>>
                  git checkout pr-<<parameters.pull_request_id>>
                name: Check out PR <<parameters.pull_request_id>>
                working_directory: /tmp/<<parameters.repo>>
  install-browsers:
    description: Install Google Chrome or Firefox
    parameters:
      executor:
        default: cy-doc
        description: The executor in use. Only used if Windows for workaround purposes
        type: executor
      firefox-version:
        default: "142.0"
        description: Firefox version to install
        type: string
      google-chrome-channel:
        default: stable
        description: Google Chrome channel to install
        type: string
      google-chrome-for-testing-version:
        default: 140.0.7339.207
        description: Google Chrome for Testing version to install
        type: string
      google-chrome-version:
        default: 140.0.7339.207
        description: Google Chrome version to install
        type: string
      install-chrome:
        default: false
        description: whether or not to install google chrome
        type: boolean
      install-chrome-for-testing:
        default: false
        description: whether or not to install google chrome for testing
        type: boolean
      install-firefox:
        default: false
        description: whether or not to install firefox
        type: boolean
    steps:
      - when:
          condition:
            not:
              equal:
                - environment:
                    PLATFORM: windows
                  machine:
                    image: windows-server-2022-gui:stable
                    shell: bash.exe -eo pipefail
                  resource_class: windows.large
                - << parameters.executor >>
          steps:
            - when:
                condition:
                  equal:
                    - true
                    - << parameters.install-firefox >>
                steps:
                  - browser-tools/install_firefox:
                      version: << parameters.firefox-version >>
            - when:
                condition:
                  equal:
                    - true
                    - << parameters.install-chrome >>
                steps:
                  - browser-tools/install_chrome:
                      channel: << parameters.google-chrome-channel >>
                      chrome_version: << parameters.google-chrome-version >>
                  - when:
                      condition:
                        equal:
                          - beta
                          - << parameters.google-chrome-channel>>
                      steps:
                        - run:
                            command: |
                              rm /usr/bin/google-chrome
                            name: remove linked google-chrome binary
            - when:
                condition:
                  equal:
                    - true
                    - << parameters.install-chrome-for-testing >>
                steps:
                  - run:
                      command: |
                        apt-get update && apt-get install -y unzip
                      name: Install unzip
                  - browser-tools/install_chrome_for_testing:
                      install_chromedriver: false
                      version: << parameters.google-chrome-for-testing-version >>
  install-required-node:
    description: Install Node version matching .node-version
    steps:
      - run:
          command: |
            source ./scripts/ensure-node.sh
            echo "Installing Yarn"
            npm install yarn --location=global # ensure yarn is installed with the correct node engine
            yarn check-node-version
          name: Install Node
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn check-node-version
          name: Check Node
  install-webkit-deps:
    steps:
      - run:
          command: |
            npx playwright install webkit
            npx playwright install-deps webkit
          name: Install WebKit dependencies
  install_cache_helpers_dependencies:
    steps:
      - run:
          command: npm i glob@7.1.6 fs-extra@10.0.0 minimist@1.2.5
            fast-json-stable-stringify@2.1.0
          name: Cache Helper Dependencies
          working_directory: ~/
  maybe_skip_binary_jobs:
    steps:
      - run:
          command: |
            if [[ -z "$CIRCLE_TOKEN" ]]; then
              echo "There is no CIRCLE_TOKEN set for this job. Cannot trigger binary build. Skipping job."
              circleci-agent step halt
            fi
          name: Skip binary job if external PR
  post-install-comment:
    description: Post GitHub comment with a blurb on how to install pre-release version
    parameters:
      binary_url_path:
        default: binary-url.json
        type: string
      package_url_path:
        default: npm-package-url.json
        type: string
    steps:
      - run:
          command: |
            node scripts/add-install-comment.js \
              --npm << parameters.package_url_path >> \
              --binary << parameters.binary_url_path >>
          name: Post pre-release install comment
  prepare-modules-cache:
    parameters:
      dont-move:
        default: false
        type: boolean
    steps:
      - run: node scripts/circle-cache.js --action prepare
      - unless:
          condition: << parameters.dont-move >>
          steps:
            - run:
                command: |
                  mkdir -p /tmp/node_modules_cache
                  mv ~/cypress/node_modules /tmp/node_modules_cache/root_node_modules
                  mv ~/cypress/cli/node_modules /tmp/node_modules_cache/cli_node_modules
                  mv ~/cypress/system-tests/node_modules /tmp/node_modules_cache/system-tests_node_modules
                  mv ~/cypress/globbed_node_modules /tmp/node_modules_cache/globbed_node_modules
                name: Move to /tmp dir for consistent caching across root/non-root users
  restore_cached_binary:
    steps:
      - attach_workspace:
          at: ~/
  restore_cached_system_tests_deps:
    description: Restore the cached node_modules for projects in "system-tests/projects/**"
    steps:
      - run:
          command: ./system-tests/scripts/cache-key.sh > system_tests_cache_key
          name: Generate Circle Cache key for system tests
      - run:
          command: node ./scripts/get-platform-key.js > platform_key
          name: Generate platform key
      - restore_cache:
          keys:
            - v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum
              "platform_key" }}-system-tests-projects-node-modules-cache-{{
              checksum "system_tests_cache_key" }}
          name: Restore system tests node_modules cache
  restore_cached_workspace:
    steps:
      - attach_workspace:
          at: ~/
      - install-required-node
      - unpack-dependencies
  restore_workspace_binaries:
    steps:
      - attach_workspace:
          at: ~/
      - run: ls -l
      - run: ls -l cypress.zip cypress.tgz
      - run: node --version
      - run: npm --version
  run-binary-system-tests:
    steps:
      - restore_cached_workspace
      - restore_cached_system_tests_deps
      - run:
          command: |
            ALL_SPECS=`circleci tests glob "$HOME/cypress/system-tests/test-binary/*spec*"`
            SPECS=`echo $ALL_SPECS | xargs -n 1 | circleci tests split --split-by=timings`
            echo SPECS=$SPECS
            yarn workspace @tooling/system-tests test:ci $SPECS
          environment:
            CYPRESS_COMMERCIAL_RECOMMENDATIONS: "0"
          name: Run system tests
      - sanitize-verify-and-store-mocha-results
  run-driver-integration-tests:
    parameters:
      browser:
        description: browser shortname to target
        type: string
      firefox-version:
        default: "142.0"
        description: firefox version to install
        type: string
      inject-document-domain:
        default: false
        description: run subset of tests with injectDocumentDomain config enabled
        type: boolean
      install-chrome-channel:
        default: stable
        description: chrome channel to install
        type: string
    steps:
      - restore_cached_workspace
      - when:
          condition:
            equal:
              - chrome
              - << parameters.browser >>
          steps:
            - install-browsers:
                install-chrome: true
      - when:
          condition:
            equal:
              - chrome:beta
              - << parameters.browser >>
          steps:
            - install-browsers:
                google-chrome-channel: << parameters.install-chrome-channel >>
                google-chrome-version: 141.0.7390.30
                install-chrome: true
      - when:
          condition:
            equal:
              - firefox
              - << parameters.browser >>
          steps:
            - install-browsers:
                firefox-version: << parameters.firefox-version >>
                install-firefox: true
      - when:
          condition:
            equal:
              - webkit
              - << parameters.browser >>
          steps:
            - install-webkit-deps
      - run:
          command: |
            echo Current working directory is $PWD
            echo Total containers $CIRCLE_NODE_TOTAL

            if << parameters.inject-document-domain >> ; then
              YARN_CMD="cypress:run:inject-document-domain"
              PARALLEL="--parallel --group 5x-driver-inject-document-domain-<<parameters.browser>>"
            else
              YARN_CMD="cypress:run"
              PARALLEL="--parallel --group 5x-driver-<<parameters.browser>>"
            fi

            if [[ -v MAIN_RECORD_KEY ]]; then
              # internal PR
              CYPRESS_RECORD_KEY=$MAIN_RECORD_KEY \
              CYPRESS_INTERNAL_ENABLE_TELEMETRY="true" \
              yarn $YARN_CMD --record $PARALLEL --browser <<parameters.browser>> --runner-ui
            else
              # external PR
              TESTFILES=$(circleci tests glob "cypress/e2e/**/*.cy.*" | circleci tests split --total=$CIRCLE_NODE_TOTAL)
              echo "Test files for this machine are $TESTFILES"

              if [[ -z "$TESTFILES" ]]; then
                echo "Empty list of test files"
              fi
              yarn $YARN_CMD --browser <<parameters.browser>> --spec $TESTFILES --runner-ui
            fi
          environment:
            CYPRESS_CONFIG_ENV: production
          name: Run driver tests in Cypress
          working_directory: packages/driver
      - sanitize-verify-and-store-mocha-results
  run-new-ui-tests:
    parameters:
      browser:
        description: browser shortname to target
        type: string
      debug:
        default: ""
        description: debug option
        type: string
      executor:
        description: the executor in use. Only used if Windows for workaround purposes
        type: executor
      package:
        description: package to target
        enum:
          - frontend-shared
          - launchpad
          - app
          - reporter
        type: enum
      percy:
        default: false
        description: enable percy
        type: boolean
      type:
        description: ct or e2e
        enum:
          - ct
          - e2e
        type: enum
    steps:
      - restore_cached_workspace
      - when:
          condition:
            equal:
              - environment:
                  PLATFORM: windows
                machine:
                  image: windows-server-2022-gui:stable
                  shell: bash.exe -eo pipefail
                resource_class: windows.large
              - << parameters.executor >>
          steps:
            - run:
                command: rm -rf node_modules && yarn
                name: reinstall dependencies to work around cache issue (Windows only)
      - install-browsers:
          executor: << parameters.executor >>
          install-chrome: true
          install-firefox: true
      - windows-install-chrome:
          browser: <<parameters.browser>>
      - run:
          command: |
            echo Current working directory is $PWD
            echo Total containers $CIRCLE_NODE_TOTAL

            if [[ -v MAIN_RECORD_KEY ]]; then
              # internal PR
              cmd=$([[ <<parameters.percy>> == 'true' ]] && echo 'yarn percy exec --parallel -- --') || true

              DEBUG=<<parameters.debug>> \
              CYPRESS_CONFIG_ENV=production \
              CYPRESS_RECORD_KEY=$MAIN_RECORD_KEY \
              PERCY_PARALLEL_NONCE=$CIRCLE_WORKFLOW_WORKSPACE_ID \
              PERCY_ENABLE=${PERCY_TOKEN:-0} \
              PERCY_PARALLEL_TOTAL=-1 \
              CYPRESS_INTERNAL_ENABLE_TELEMETRY="true" \
              $cmd yarn workspace @packages/<<parameters.package>> cypress:run:<<parameters.type>> --browser <<parameters.browser>> --record --parallel --group <<parameters.package>>-<<parameters.type>>
            else
              # external PR

              # To make `circleci tests` work correctly, we need to step into the package folder.
              cd packages/<<parameters.package>>

              if [[ <<parameters.type>> == 'ct' ]]; then
                # component tests are located side by side with the source codes.
                # for the app component tests, ignore specs that are known to cause failures on contributor PRs (see https://discuss.circleci.com/t/how-to-exclude-certain-files-from-circleci-test-globbing/41028)
                TESTFILES=$(find src -regextype posix-extended -name '*.cy.*' | circleci tests split --total=$CIRCLE_NODE_TOTAL)
              else
                GLOB="cypress/e2e/**/*cy.*"
                TESTFILES=$(circleci tests glob "$GLOB" | circleci tests split --total=$CIRCLE_NODE_TOTAL)
              fi

              echo "Test files for this machine are $TESTFILES"

              # To run the `yarn` command, we need to walk out of the package folder.
              cd ../..

              DEBUG=<<parameters.debug>> \
              CYPRESS_CONFIG_ENV=production \
              PERCY_PARALLEL_NONCE=$CIRCLE_WORKFLOW_WORKSPACE_ID \
              PERCY_ENABLE=${PERCY_TOKEN:-0} \
              PERCY_PARALLEL_TOTAL=-1 \
              yarn workspace @packages/<<parameters.package>> cypress:run:<<parameters.type>> --browser <<parameters.browser>> --spec $TESTFILES
            fi
          name: Run <<parameters.package>> UI tests
      - run:
          command: |
            if [[ <<parameters.package>> == 'app' && <<parameters.percy>> == 'true' && -d "packages/app/cypress/screenshots/runner/screenshot/screenshot.cy.tsx/percy" ]]; then
              PERCY_PARALLEL_NONCE=$CIRCLE_WORKFLOW_WORKSPACE_ID \
              PERCY_ENABLE=${PERCY_TOKEN:-0} \
              PERCY_PARALLEL_TOTAL=-1 \
              yarn percy upload packages/app/cypress/screenshots/runner/screenshot/screenshot.cy.tsx/percy
            else
              echo "skipping percy screenshots uploading"
            fi
      - sanitize-verify-and-store-mocha-results
  run-on-dependencies:
    parameters:
      command:
        description: Command to run on the dependencies.
        type: string
      package:
        description: Package to build all dependencies for. All dependencies in the
          dependency chain must have a build script.
        type: string
    steps:
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn lerna run <<parameters.command>> --scope=<<parameters.package>> --include-dependencies
          name: Exec << parameters.command >> recursively on << parameters.package >>
            dependencies.
  run-system-tests:
    parameters:
      browser:
        description: browser shortname to target
        type: string
    steps:
      - restore_cached_workspace
      - restore_cached_system_tests_deps
      - when:
          condition:
            equal:
              - webkit
              - << parameters.browser >>
          steps:
            - install-webkit-deps
      - install-browsers:
          install-chrome: true
          install-chrome-for-testing: true
          install-firefox: true
      - run:
          command: |
            ALL_SPECS=`circleci tests glob "/root/cypress/system-tests/test/*spec*"`
            SPECS=
            for file in $ALL_SPECS; do
              # filter out non_root tests, they have their own stage
              if [[ "$file" == *"non_root"* ]]; then
                echo "Skipping $file"
                continue
              fi
              SPECS="$SPECS $file"
            done
            SPECS=`echo $SPECS | xargs -n 1 | circleci tests split --split-by=timings`
            echo SPECS=$SPECS
            yarn workspace @tooling/system-tests test:ci $SPECS --browser <<parameters.browser>>
          environment:
            CYPRESS_COMMERCIAL_RECOMMENDATIONS: "0"
          name: Run system tests
      - sanitize-verify-and-store-mocha-results
  sanitize-verify-and-store-mocha-results:
    description: Double-check that Mocha tests ran as expected.
    parameters:
      expectedResultCount:
        default: 0
        description: The number of result files to expect, ie, the number of Mocha test
          suites that ran.
        type: integer
      testResultsPath:
        default: /tmp/cypress
        description: The path to the test results
        type: string
    steps:
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn sanitize:mocha:results
          name: Sanitize Mocha Results
          when: always
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn verify:mocha:results <<parameters.expectedResultCount>>
          name: Verify Mocha Results
      - store_test_results:
          path: <<parameters.testResultsPath>>
  setup_should_persist_artifacts:
    steps:
      - run:
          command: |
            echo "Setting SHOULD_PERSIST_ARTIFACTS variable"
            echo 'if ! [[ "$CIRCLE_BRANCH" != "develop" && "$CIRCLE_BRANCH" != "release/"* && "$CIRCLE_BRANCH" != "fix/dbus-messages" ]]; then
                export SHOULD_PERSIST_ARTIFACTS=true
            fi' >> "$BASH_ENV"
          name: Set environment variable to determine whether or not to persist artifacts
  test-binary-against-repo:
    description: |
      Takes the built binary and NPM package, clones given example repo
      and runs the new version of Cypress against it.
    parameters:
      browser:
        default: ""
        description: Name of the browser to use, like "electron", "chrome", "firefox"
        enum:
          - ""
          - electron
          - chrome
          - firefox
        type: enum
      build-project:
        default: true
        description: Should the project build script be executed
        type: boolean
      command:
        default: npm run e2e
        description: Test command to run to start Cypress tests
        type: string
      executor:
        default: cy-doc
        description: The executor in use. Only used if Windows for workaround purposes
        type: executor
      folder:
        default: ""
        description: Subfolder to test in
        type: string
      pull_request_id:
        default: 0
        description: Pull request number to check out before installing and testing
        type: integer
      repo:
        description: 'Name of the github repo to clone like: cypress-example-kitchensink'
        type: string
      server-start-command:
        default: npm start --if-present
        description: Server start command for repo
        type: string
      wait-on:
        default: ""
        description: Whether to use wait-on to wait on a server to be booted
        type: string
    steps:
      - run:
          command: |
            yarn --version || npm i -g yarn
          name: Install yarn if not already installed
      - clone-repo-and-checkout-branch:
          pull_request_id: <<parameters.pull_request_id>>
          repo: <<parameters.repo>>
      - run:
          command: |
            if [[ -f .node-version ]]; then
              branch="<< pipeline.git.branch >>"

              externalBranchPattern='^pull\/[0-9]+'
              if [[ $branch =~ $externalBranchPattern ]]; then
                # We are unable to curl from the external PR branch location
                # so we fall back to develop
                branch="develop"
              fi

              curl -L https://raw.githubusercontent.com/cypress-io/cypress/$branch/scripts/ensure-node.sh --output ci-ensure-node.sh
            else
              # if no .node-version file exists, we no-op the node script and use the global yarn
              echo '' > ci-ensure-node.sh
            fi
          working_directory: /tmp/<<parameters.repo>>
      - run:
          command: |
            source ./ci-ensure-node.sh
            if [[ -f yarn.lock ]]; then
              yarn --frozen-lockfile
              CYPRESS_INSTALL_BINARY=~/cypress/cypress.zip yarn add -D ~/cypress/cypress.tgz
            else
              npm install
              CYPRESS_INSTALL_BINARY=~/cypress/cypress.zip npm install --legacy-peer-deps ~/cypress/cypress.tgz
            fi
          working_directory: /tmp/<<parameters.repo>>
      - run:
          command: |
            source ./ci-ensure-node.sh
            npx cypress version
          name: Print Cypress version
          working_directory: /tmp/<<parameters.repo>>
      - run:
          command: |
            source ./ci-ensure-node.sh
            [[ -f yarn.lock ]] && yarn types || npm run types --if-present
          name: "Types check 🧩 (maybe)"
          working_directory: /tmp/<<parameters.repo>>
      - when:
          condition: <<parameters.build-project>>
          steps:
            - run:
                command: |
                  source ./ci-ensure-node.sh
                  [[ -f yarn.lock ]] && yarn build || npm run build --if-present
                name: "Build 🏗 (maybe)"
                working_directory: /tmp/<<parameters.repo>>
      - run:
          background: true
          command: |
            source ./ci-ensure-node.sh
            <<parameters.server-start-command>>
          working_directory: /tmp/<<parameters.repo>>
      - when:
          condition:
            not:
              equal:
                - ""
                - <<parameters.wait-on>>
          steps:
            - run:
                command: |
                  npm i -g wait-on
                  npx wait-on <<parameters.wait-on>> --timeout 120000
                name: 'Waiting on server to boot: <<parameters.wait-on>>'
      - install-browsers:
          executor: << parameters.executor >>
          install-chrome: true
          install-firefox: true
      - windows-install-chrome:
          browser: <<parameters.browser>>
      - when:
          condition: <<parameters.folder>>
          steps:
            - when:
                condition: <<parameters.browser>>
                steps:
                  - run:
                      command: |
                        <<parameters.command>> -- --browser <<parameters.browser>>
                      name: Run tests using browser "<<parameters.browser>>"
                      working_directory: /tmp/<<parameters.repo>>/<<parameters.folder>>
            - unless:
                condition: <<parameters.browser>>
                steps:
                  - run:
                      command: <<parameters.command>>
                      name: Run tests using command
                      working_directory: /tmp/<<parameters.repo>>/<<parameters.folder>>
      - unless:
          condition: <<parameters.folder>>
          steps:
            - when:
                condition: <<parameters.browser>>
                steps:
                  - run:
                      command: |
                        source ./ci-ensure-node.sh
                        <<parameters.command>> -- --browser <<parameters.browser>>
                      name: Run tests using browser "<<parameters.browser>>"
                      working_directory: /tmp/<<parameters.repo>>
            - unless:
                condition: <<parameters.browser>>
                steps:
                  - run:
                      command: |
                        source ./ci-ensure-node.sh
                        <<parameters.command>>
                      name: Run tests using command
                      working_directory: /tmp/<<parameters.repo>>
  test-binary-against-rwa:
    description: |
      Takes the built binary and NPM package, clones the RWA repo
      and runs the new version of Cypress against it.
    parameters:
      browser:
        default: ""
        description: Name of the browser to use, like "electron", "chrome", "firefox"
        enum:
          - ""
          - electron
          - chrome
          - firefox
        type: enum
      command:
        default: CYPRESS_INTERNAL_ENABLE_TELEMETRY=1 CYPRESS_RECORD_KEY=$MAIN_RECORD_KEY
          CYPRESS_PROJECT_ID=ypt4pf yarn cypress:run
        description: Test command to run to start Cypress tests
        type: string
      folder:
        default: ""
        description: Subfolder to test in
        type: string
      pull_request_id:
        default: 0
        description: Pull request number to check out before installing and testing
        type: integer
      repo:
        default: cypress-realworld-app
        description: Name of the github repo to clone like
        type: string
      server-start-command:
        default: CI=true yarn start
        description: Server start command for repo
        type: string
    steps:
      - clone-repo-and-checkout-branch:
          repo: <<parameters.repo>>
      - when:
          condition: <<parameters.pull_request_id>>
          steps:
            - run:
                command: |
                  git fetch origin pull/<<parameters.pull_request_id>>/head:pr-<<parameters.pull_request_id>>
                  git checkout pr-<<parameters.pull_request_id>>
                  git log -n 2
                name: Check out PR <<parameters.pull_request_id>>
                working_directory: /tmp/<<parameters.repo>>
      - run:
          command: yarn
          working_directory: /tmp/<<parameters.repo>>
      - run:
          command: |
            CYPRESS_INSTALL_BINARY=~/cypress/cypress.zip npm i --legacy-peer-deps ~/cypress/cypress.tgz && [[ -f yarn.lock ]] && yarn
          name: Install Cypress
          working_directory: /tmp/<<parameters.repo>>
      - install-browsers:
          install-chrome: true
      - run:
          command: npx cypress version
          name: Print Cypress version
          working_directory: /tmp/<<parameters.repo>>
      - run:
          command: yarn types
          name: "Types check 🧩 (maybe)"
          working_directory: /tmp/<<parameters.repo>>
      - run:
          background: true
          command: <<parameters.server-start-command>>
          working_directory: /tmp/<<parameters.repo>>
      - when:
          condition: <<parameters.folder>>
          steps:
            - when:
                condition: <<parameters.browser>>
                steps:
                  - run:
                      command: |
                        <<parameters.command>> --browser <<parameters.browser>> --record false
                      name: Run tests using browser "<<parameters.browser>>"
                      working_directory: /tmp/<<parameters.repo>>/<<parameters.folder>>
            - unless:
                condition: <<parameters.browser>>
                steps:
                  - run:
                      command: <<parameters.command>>
                      name: Run tests using command
                      working_directory: /tmp/<<parameters.repo>>/<<parameters.folder>>
      - unless:
          condition: <<parameters.folder>>
          steps:
            - when:
                condition: <<parameters.browser>>
                steps:
                  - run:
                      command: <<parameters.command>> --browser <<parameters.browser>> --record false
                      name: Run tests using browser "<<parameters.browser>>"
                      working_directory: /tmp/<<parameters.repo>>
            - unless:
                condition: <<parameters.browser>>
                steps:
                  - run:
                      command: <<parameters.command>>
                      name: Run tests using command
                      working_directory: /tmp/<<parameters.repo>>
  trigger-publish-binary-pipeline:
    steps:
      - run:
          command: |
            source ./scripts/ensure-node.sh
            echo $SHOULD_PERSIST_ARTIFACTS
            node ./scripts/binary/trigger-publish-binary-pipeline.js
          name: Trigger publish-binary pipeline
      - persist_to_workspace:
          paths:
            - triggered_pipeline.json
          root: ~/
  unpack-dependencies:
    description: Unpacks dependencies associated with the current workflow
    steps:
      - install_cache_helpers_dependencies
      - run:
          command: node scripts/circle-cache.js --action cacheKey > circle_cache_key
          name: Generate Circle Cache Key
      - run:
          command: node ./scripts/get-platform-key.js > platform_key
          name: Generate platform key
      - restore_cache:
          key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
            }}-node-modules-cache-{{ checksum "circle_cache_key" }}
          name: Restore cache state, to check for known modules cache existence
      - run:
          command: |
            if [[ -d "/tmp/node_modules_cache" ]]; then
              mv /tmp/node_modules_cache/root_node_modules ~/cypress/node_modules
              mv /tmp/node_modules_cache/cli_node_modules ~/cypress/cli/node_modules
              mv /tmp/node_modules_cache/system-tests_node_modules ~/cypress/system-tests/node_modules
              mv /tmp/node_modules_cache/globbed_node_modules ~/cypress/globbed_node_modules
              rm -rf /tmp/node_modules_cache
            fi
          name: Move node_modules back from /tmp
      - run:
          command: node scripts/circle-cache.js --action unpack
          name: Restore all node_modules to proper workspace folders
  update_cached_system_tests_deps:
    description: Update the cached node_modules for projects in "system-tests/projects/**"
    steps:
      - run:
          command: ./system-tests/scripts/cache-key.sh > system_tests_cache_key
          name: Generate Circle Cache key for system tests
      - run:
          command: node ./scripts/get-platform-key.js > platform_key
          name: Generate platform key
      - restore_cache:
          keys:
            - v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum
              "platform_key"
              }}-state-of-system-tests-projects-node-modules-cache-{{ checksum
              "system_tests_cache_key" }}
          name: Restore cache state, to check for known modules cache existence
      - run:
          command: |
            if [[ -f "/tmp/system_tests_node_modules_installed" ]]; then
              echo "No updates to system tests node modules, exiting"
              circleci-agent step halt
            fi
          name: Bail if specific cache exists
      - restore_cache:
          keys:
            - v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum
              "platform_key" }}-system-tests-projects-node-modules-cache-{{
              checksum "system_tests_cache_key" }}
            - v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum
              "platform_key" }}-system-tests-projects-node-modules-cache-
          name: Restore system tests node_modules cache
      - run:
          command: yarn workspace @tooling/system-tests projects:yarn:install
          name: Update system-tests node_modules cache
      - save_cache:
          key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
            }}-system-tests-projects-node-modules-cache-{{ checksum
            "system_tests_cache_key" }}
          name: Save system tests node_modules cache
          paths:
            - /tmp/cy-system-tests-node-modules
      - run: touch /tmp/system_tests_node_modules_installed
      - save_cache:
          key: v{{ checksum ".circleci/cache-version.txt" }}-{{ checksum "platform_key"
            }}-state-of-system-tests-projects-node-modules-cache-{{ checksum
            "system_tests_cache_key" }}
          name: Save system tests node_modules cache state key
          paths:
            - /tmp/system_tests_node_modules_installed
  update_known_hosts:
    description: Ensures that we have the latest Git public keys to prevent git+ssh
      from failing.
    steps:
      - run:
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
          name: Update known_hosts with github.com keys
  upload-build-artifacts:
    steps:
      - run: ls -l
      - run:
          command: |
            node scripts/binary.js upload-build-artifact \
              --type binary \
              --file cypress.zip \
              --version $(node -p "require('./package.json').version")
          name: Upload unique binary to S3
      - run:
          command: |
            node scripts/binary.js upload-build-artifact \
              --type npm-package \
              --file cypress.tgz \
              --version $(node -p "require('./package.json').version")
          name: Upload NPM package to S3
      - run: ls -l
      - run: cat binary-url.json
      - run: cat npm-package-url.json
      - persist_to_workspace:
          paths:
            - cypress/binary-url.json
            - cypress/npm-package-url.json
          root: ~/
  verify-build-setup:
    description: Common commands run when setting up for build or yarn install
    parameters:
      executor:
        default: cy-doc
        type: executor
    steps:
      - run: pwd
      - run:
          command: yarn versions
          name: print yarn version
      - unless:
          condition:
            equal:
              - environment:
                  PLATFORM: windows
                machine:
                  image: windows-server-2022-gui:stable
                  shell: bash.exe -eo pipefail
                resource_class: windows.large
              - << parameters.executor >>
          steps:
            - run:
                command: |
                  source ./scripts/ensure-node.sh
                  yarn stop-only-all
                name: Stop .only
      - run:
          command: |
            source ./scripts/ensure-node.sh
            yarn check-terminal
          name: Check terminal variables
  verify_should_persist_artifacts:
    steps:
      - run:
          command: |
            if [[ -z "$SHOULD_PERSIST_ARTIFACTS" ]]; then
              echo "Not uploading artifacts or posting install comment for this branch."
              circleci-agent step halt
            fi
          name: Check current branch to persist artifacts
  windows-install-chrome:
    parameters:
      browser:
        description: browser shortname to target
        type: string
    steps:
      - run:
          command: |
            # install with `--ignore-checksums` to avoid checksum error
            # https://www.gep13.co.uk/blog/chocolatey-error-hashes-do-not-match
            [[ $PLATFORM == 'windows' && '<<parameters.browser>>' == 'chrome' ]] && choco install googlechrome -y --ignore-checksums || [[ $PLATFORM != 'windows' ]]
          name: Install Chrome on Windows
defaults:
  environment:
    CIRCLE_ARTIFACTS: /tmp/artifacts
    COLUMNS: 100
    LINES: 24
    TZ: /usr/share/zoneinfo/America/New_York
  executor: <<parameters.executor>>
  parallelism: 1
  parameters:
    executor:
      default: cy-doc
      type: executor
    only-cache-for-root-user:
      default: false
      type: boolean
  working_directory: ~/cypress
executors:
  cy-doc:
    docker:
      - image: cypress/base-internal:22.18.0-bullseye
    environment:
      PLATFORM: linux
    resource_class: medium
  darwin-amd64:
    environment:
      PLATFORM: darwin
    machine: true
  darwin-arm64:
    environment:
      PLATFORM: darwin
    machine: true
  kitchensink-executor:
    docker:
      - image: cypress/base-internal:22.18.0-bullseye
    environment:
      PLATFORM: linux
    resource_class: medium
  linux-arm64:
    environment:
      DISABLE_SNAPSHOT_REQUIRE: 1
      PLATFORM: linux
    machine:
      image: ubuntu-2004:2024.11.1
    resource_class: arm.medium
  linux-x64:
    environment:
      PLATFORM: linux
    machine:
      image: ubuntu-2004:2024.11.1
    resource_class: medium
  non-root-docker-user:
    docker:
      - image: cypress/base-internal:22.18.0-bullseye
        user: node
    environment:
      PLATFORM: linux
  windows:
    environment:
      PLATFORM: windows
    machine:
      image: windows-server-2022-gui:stable
      shell: bash.exe -eo pipefail
    resource_class: windows.large
firefox-stable-version: "142.0"
jobs:
  binary-system-tests:
    environment:
      CIRCLE_ARTIFACTS: /tmp/artifacts
      COLUMNS: 100
      LINES: 24
      PLATFORM: linux
      TZ: /usr/share/zoneinfo/America/New_York
    machine:
      docker_layer_caching: true
      image: ubuntu-2004:2024.05.1
    parallelism: 2
    resource_class: medium
    steps:
      - maybe_skip_binary_jobs
      - run-binary-system-tests
    working_directory: ~/cypress
  build:
    environment:
      CIRCLE_ARTIFACTS: /tmp/artifacts
      COLUMNS: 100
      LINES: 24
      TZ: /usr/share/zoneinfo/America/New_York
    executor: <<parameters.executor>>
    parallelism: 1
    parameters:
      executor:
        default: cy-doc
        type: executor
      is_contributor_pr:
        default: false
        type: boolean
      only-cache-for-root-user:
        default: false
        type: boolean
      resource_class:
        default: large
        type: string
    resource_class: << parameters.resource_class >>
    steps:
      - restore_cached_workspace
      - when:
          condition:
            equal:
              - environment:
                  PLATFORM: windows
                machine:
                  image: windows-server-2022-gui:stable
                  shell: bash.exe -eo pipefail
                resource_class: windows.large
              - << parameters.executor >>
          steps:
            - run:
                command: rm -rf node_modules && yarn
                name: reinstall dependencies to work around cache issue (Windows only)
      - run:
          command: yarn list --depth=0 || true
          name: Top level packages
      - run:
          command: node ./scripts/circle-env.js --check-canaries --is-contributor-pr <<
            parameters.is_contributor_pr >>
          name: Check env canaries
      - build-and-persist
    working_directory: ~/cypress
  check-ts:
    environment:
      CIRCLE_ARTIFACTS: /tmp/artifacts
      COLUMNS: 100
      LINES: 24
      TZ: /usr/share/zoneinfo/America/New_York
    executor: <<parameters.executor>>
    parallelism: 1
    parameters:
      executor:
        default: cy-doc
        type: executor
      only-cache-for-root-user:
        default: false
        type: boolean
    steps:
      - restore_cached_workspace
      - install-required-node
      - run:
          command: NODE_OPTIONS=--max_old_space_size=4096 yarn check-ts --concurrency=1
          name: Check TS Types
    working_directory: ~/cypress
  cli-visual-tests:
    environment:
      CIRCLE_ARTIFACTS: /tmp/artifacts
      COLUMNS: 100
      LINES: 24
      TZ: /usr/share/zoneinfo/America/New_York
    executor: <<parameters.executor>>
    parallelism: 1
    parameters:
      executor:
        default: cy-doc
        type: executor
      only-cache-for-root-user:
        default: false
        type: boolean
    resource_class: small
    steps:
      - restore_cached_workspace
      - run: mkdir -p cli/visual-snapshots
      - run:
          command: node cli/bin/cypress info --dev | yarn --silent term-to-html | node
            scripts/sanitize --type cli-info >
            cli/visual-snapshots/cypress-info.html
          environment:
            FORCE_COLOR: 2
      - run:
          command: node cli/bin/cypress help | yarn --silent term-to-html >
            cli/visual-snapshots/cypress-help.html
          environment:
            FORCE_COLOR: 2
      - run:
          command: |
            PERCY_PARALLEL_NONCE=$CIRCLE_WORKFLOW_WORKSPACE_ID \
            PERCY_ENABLE=${PERCY_TOKEN:-0} \
            PERCY_PARALLEL_TOTAL=-1 \
            yarn percy snapshot ./cli/visual-snapshots
          name: Upload CLI snapshots for diffing
