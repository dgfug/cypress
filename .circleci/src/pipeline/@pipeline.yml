          name: Install Cypress
          working_directory: test-binary
          command: CYPRESS_INSTALL_BINARY=/root/cypress/cypress.zip npm install
            /root/cypress/cypress.tgz
      - run:
          name: Verify Cypress binary
          working_directory: test-binary
          command: npx cypress verify
      - run:
          name: Cypress version
          working_directory: test-binary
          command: npx cypress version
      - run:
          name: Cypress help
          working_directory: test-binary
          command: npx cypress help
      - run:
          name: Cypress info
          working_directory: test-binary
          command: npx cypress info

  test-types-cypress-and-jest:
    parameters:
      executor:
        description: Executor name to use
        type: executor
        default: cy-docker
      wd:
        description: Working directory, should be OUTSIDE cypress monorepo folder
        type: string
        default: /root/test-cypress-and-jest
    <<: *defaults
    resource_class: small
    steps:
      - maybe_skip_binary_jobs
      - restore_workspace_binaries
      - run: mkdir <<parameters.wd>>
      - run:
          name: Create new NPM package ⚗️
          working_directory: <<parameters.wd>>
          command: npm init -y
      - run:
          name: Install dependencies 📦
          working_directory: <<parameters.wd>>
          environment:
            CYPRESS_INSTALL_BINARY: /root/cypress/cypress.zip
          # let's install Cypress, Jest and any other package that might conflict
          # https://github.com/cypress-io/cypress/issues/6690

          # Todo: Add `jest` back into the list once https://github.com/yargs/yargs-parser/issues/452
          # is resolved.
          command: |
            npm install /root/cypress/cypress.tgz \
              typescript @types/jest enzyme @types/enzyme
      - run:
          name: Test types clash ⚔️
          working_directory: <<parameters.wd>>
          command: |
            echo "console.log('hello world')" > hello.ts
            npx tsc hello.ts --noEmit

  test-full-typescript-project:
    parameters:
      executor:
        description: Executor name to use
        type: executor
        default: cy-docker
    <<: *defaults
    resource_class: small
    steps:
      - maybe_skip_binary_jobs
      - restore_workspace_binaries
      - clone-repo-and-checkout-branch:
          repo: cypress-test-tiny
      - run:
          name: Checkout Typescript Example
          working_directory: /tmp/cypress-test-tiny
          command: |
            git checkout full-typescript
      - run:
          name: Install dependencies 📦
          working_directory: /tmp/cypress-test-tiny
          environment:
            CYPRESS_INSTALL_BINARY: /root/cypress/cypress.zip
          command: |
            npm install /root/cypress/cypress.tgz typescript
      - run:
          name: Run project tests 🗳
          working_directory: /tmp/cypress-test-tiny
          command: npm run cypress:run

  # install NPM + binary zip and run against staging API
  test-binary-against-staging:
    <<: *defaults
    steps:
      - restore_workspace_binaries
      - clone-repo-and-checkout-branch:
          repo: cypress-test-tiny
      - run:
          name: Install Cypress
          working_directory: /tmp/cypress-test-tiny
          # force installing the freshly built binary
          command: CYPRESS_INSTALL_BINARY=~/cypress/cypress.zip npm i --legacy-peer-deps
            ~/cypress/cypress.tgz
      - run:
          name: Run test project
          working_directory: /tmp/cypress-test-tiny
          command: |
            CYPRESS_PROJECT_ID=$TEST_TINY_PROJECT_ID \
            CYPRESS_RECORD_KEY=$TEST_TINY_RECORD_KEY \
            CYPRESS_INTERNAL_ENV=staging \
            $(yarn bin cypress) run --record

  test-binary-against-recipes-firefox:
    <<: *defaults
    steps:
      - test-binary-against-repo:
          repo: cypress-example-recipes
          command: npm run test:ci:firefox
          browser: firefox

  test-binary-against-recipes-chrome:
    <<: *defaults
    steps:
      - test-binary-against-repo:
          repo: cypress-example-recipes
          command: npm run test:ci:chrome
          browser: chrome

  test-binary-against-recipes:
    <<: *defaults
    parallelism: 4
    steps:
      - test-binary-against-repo:
          repo: cypress-example-recipes
          # Split the specs up across 4 different machines to run in parallel
          command: npm run test:ci -- --chunk $CIRCLE_NODE_INDEX --total-chunks
            $CIRCLE_NODE_TOTAL
          browser: electron

  # This is a special job. It allows you to test the current
  # built test runner against a pull request in the repo
  # cypress-example-recipes.
  # Imagine you are working on a feature and want to show / test a recipe
  # You would need to run the built test runner before release
  # against a PR that cannot be merged until the new version
  # of the test runner is released.
  # Use:
  #   specify pull request number
  #   and the recipe folder

  # test-binary-against-recipe-pull-request:
  #   <<: *defaults
  #   steps:
  #     # test a specific pull request by number from cypress-example-recipes
  #     - test-binary-against-repo:
  #         repo: cypress-example-recipes
  #         command: npm run test:ci
  #         pull_request_id: 515
  #         folder: examples/fundamentals__typescript

  test-binary-against-kitchensink:
    <<: *defaults
    steps:
      - maybe_skip_binary_jobs
      - test-binary-against-repo:
          repo: cypress-example-kitchensink
          browser: electron

  test-binary-against-kitchensink-firefox:
    <<: *defaults
    steps:
      - test-binary-against-repo:
          repo: cypress-example-kitchensink
          browser: firefox

  test-binary-against-kitchensink-chrome:
    <<: *defaults
    steps:
      - test-binary-against-repo:
          repo: cypress-example-kitchensink
          browser: chrome
          executor: << parameters.executor >>

  test-binary-against-cypress-realworld-app:
    <<: *defaults
    resource_class: medium+
    steps:
      - test-binary-against-rwa:
          repo: cypress-realworld-app
          browser: chrome

  test-binary-as-specific-user:
    <<: *defaults
    steps:
      - maybe_skip_binary_jobs
      - restore_workspace_binaries
      - clone-repo-and-checkout-branch:
          repo: cypress-test-tiny
      # the user should be "node"
      - run: whoami
      - run: pwd
      # prints the current user's effective user id
      # for root it is 0
      # for other users it is a positive integer
      - run: node -e 'console.log(process.geteuid())'
      # make sure the binary and NPM package files are present
      - run: ls -l
      - run: ls -l cypress.zip cypress.tgz
      - run:
          # install NPM from built NPM package folder
          name: Install Cypress
          working_directory: /tmp/cypress-test-tiny
          # force installing the freshly built binary
          command: CYPRESS_INSTALL_BINARY=~/cypress/cypress.zip npm i
            ~/cypress/cypress.tgz
      - run:
          name: Cypress help
          working_directory: /tmp/cypress-test-tiny
          command: $(yarn bin cypress) help
      - run:
          name: Cypress info
          working_directory: /tmp/cypress-test-tiny
          command: $(yarn bin cypress) info
      - run:
          name: Verify Cypress binary
          working_directory: /tmp/cypress-test-tiny
          command: DEBUG=cypress:cli $(yarn bin cypress) verify
      - run:
          name: Run Cypress binary
          working_directory: /tmp/cypress-test-tiny
          command: DEBUG=cypress:cli $(yarn bin cypress) run

  # Aggregator job — the only required GitHub status check for PRs.
  all-jobs-passed:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run:
          name: All jobs passed
          command: echo "✅ All required jobs passed"
