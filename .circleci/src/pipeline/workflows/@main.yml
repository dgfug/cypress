windows:
  when: *full-workflow-filters
  jobs:
    - node_modules_install:
        name: windows-node-modules-install
        executor: windows
        resource_class: windows.medium
        only-cache-for-root-user: true

    - build:
        name: windows-build
        context: test-runner:env-canary
        executor: windows
        resource_class: windows.large
        requires:
          - windows-node-modules-install

    - run-app-integration-tests-chrome:
        name: windows-run-app-integration-tests-chrome
        executor: windows
        resource_class: windows.large
        context: [ test-runner:cypress-record-key, test-runner:launchpad-tests ]
        requires:
          - windows-build

    - run-launchpad-integration-tests-chrome:
        name: windows-run-launchpad-integration-tests-chrome
        executor: windows
        resource_class: windows.large
        context: [ test-runner:cypress-record-key, test-runner:launchpad-tests ]
        requires:
          - windows-build

    - unit-tests:
        name: windows-unit-tests
        executor: windows
        resource_class: windows.medium
        requires:
          - windows-build

    - server-unit-tests-cloud-environment:
        name: windows-server-unit-tests-cloud-environment
        executor: windows
        resource_class: windows.medium
        requires:
          - windows-build

    - create-build-artifacts:
        name: windows-create-build-artifacts
        executor: windows
        resource_class: windows.large
        context:
          - test-runner:sign-windows-binary
          - test-runner:upload
          - test-runner:commit-status-checks
          - test-runner:build-binary
        requires:
          - windows-build

    - test-binary-against-kitchensink-chrome:
        name: windows-test-binary-against-kitchensink-chrome
        executor: windows
        requires:
          - windows-create-build-artifacts

    - v8-integration-tests:
        name: windows-v8-integration-tests
        executor: windows
        resource_class: windows.medium
        requires:
          - windows-build
    - driver-integration-memory-tests:
        name: windows-driver-integration-memory-tests
        executor: windows
        resource_class: windows.medium
        requires:
          - windows-build
