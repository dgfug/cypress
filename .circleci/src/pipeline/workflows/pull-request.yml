# The workflow runs for:
# External PR after approval (approved contributor PR that's not a main branch)
# Internal PR for any branch that is not develop, release/x.x.x, or electron/x.x.x related
when:
  and:
    - not:
        matches:
            pattern: /^release\/\d+\.\d+\.\d+$/
            value: << pipeline.git.branch >>
    - not:
        matches:
            pattern: /^electron\/\d+\.\d+\.\d+$/
            value: << pipeline.git.branch >>
    - not:
        equal: [ 'develop', << pipeline.git.branch >> ]
    - not:
        equal: [ 'update-v8-snapshot-cache-on-develop', << pipeline.git.branch >> ]
    - not:
        equal: [ true, << pipeline.parameters.force-persist-artifacts >> ]

jobs:
  # Internal PRs — install and build run immediately
  - node_modules_install:
      build-better-sqlite3: true
      filters:
        branches:
          ignore: /^pull\/[0-9]+/
  - build:
      name: internal-pr-build
      context: test-runner:env-canary
      requires:
        - node_modules_install
      filters:
        branches:
          ignore: /^pull\/[0-9]+/

  # External (contributor) PRs — everything gates behind manual approval
  - approve-contributor-pr:
      type: approval
      filters:
        branches:
          only: /^pull\/[0-9]+/
  - node_modules_install:
      name: contributor-node-modules-install
      build-better-sqlite3: true
      requires:
        - approve-contributor-pr
      filters:
        branches:
          only: /^pull\/[0-9]+/
  - build:
      name: external-pr-build
      requires:
        - contributor-node-modules-install
      filters:
        branches:
          only: /^pull\/[0-9]+/
  - check-ts:
      requires:
        - internal-pr-build
        - external-pr-build
  - health-check:
      requires:
        - internal-pr-build
        - external-pr-build
  - lint:
      name: linux-lint
      requires:
        - internal-pr-build
        - external-pr-build
  - lint-types:
      requires:
        - internal-pr-build
        - external-pr-build
  # The following jobs are only run for contributor PRs once they are approved.
  # Each job checks its pipeline parameter at startup and halts early if the
  # changed files don't require it to run.
  - cli-visual-tests:
      context: test-runner:percy
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - unit-tests:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - server-unit-tests:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - server-integration-tests:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - server-performance-tests:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - system-tests-node-modules-install:
      context: test-runner:performance-tracking
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - system-tests-chrome:
      context: test-runner:performance-tracking
      requires:
        - system-tests-node-modules-install
  - system-tests-electron:
      context: test-runner:performance-tracking
      requires:
        - system-tests-node-modules-install
  - system-tests-firefox:
      context: test-runner:performance-tracking
      requires:
        - system-tests-node-modules-install
  - system-tests-webkit:
      context: test-runner:performance-tracking
      requires:
        - system-tests-node-modules-install
  - system-tests-non-root:
      context: test-runner:performance-tracking
      executor: non-root-docker-user
      requires:
        - system-tests-node-modules-install
  - driver-integration-tests-chrome:
      context: test-runner:cypress-record-key
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - driver-integration-tests-chrome-inject-document-domain:
      context: test-runner:cypress-record-key
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - driver-integration-tests-chrome-beta:
      context: test-runner:cypress-record-key
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - driver-integration-tests-chrome-beta-inject-document-domain:
      context: test-runner:cypress-record-key
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - driver-integration-tests-firefox:
      context: test-runner:cypress-record-key
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - driver-integration-tests-electron:
      context: test-runner:cypress-record-key
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - driver-integration-tests-webkit:
      context: test-runner:cypress-record-key
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - driver-integration-memory-tests:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - run-frontend-shared-component-tests-chrome:
      context:
        [
          test-runner:cypress-record-key,
          test-runner:launchpad-tests,
          test-runner:percy
        ]
      percy: true
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - run-launchpad-integration-tests-chrome:
      context:
        [
          test-runner:cypress-record-key,
          test-runner:launchpad-tests,
          test-runner:percy
        ]
      percy: true
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - run-launchpad-component-tests-chrome:
      context:
        [
          test-runner:cypress-record-key,
          test-runner:launchpad-tests,
          test-runner:percy
        ]
      percy: true
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - run-app-integration-tests-chrome:
      context:
        [
          test-runner:cypress-record-key,
          test-runner:launchpad-tests,
          test-runner:percy
        ]
      percy: true
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - run-webpack-dev-server-integration-tests:
      context: [ test-runner:cypress-record-key, test-runner:percy ]
      requires:
        - system-tests-node-modules-install
  - run-vite-dev-server-integration-tests:
      context: [ test-runner:cypress-record-key, test-runner:percy ]
      requires:
        - system-tests-node-modules-install
  - run-app-component-tests-chrome:
      context:
        [
          test-runner:cypress-record-key,
          test-runner:launchpad-tests,
          test-runner:percy
        ]
      percy: true
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - run-reporter-component-tests-chrome:
      context: [ test-runner:cypress-record-key, test-runner:percy ]
      percy: true
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - reporter-integration-tests:
      context: [ test-runner:cypress-record-key, test-runner:percy ]
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-webpack-dev-server:
      requires:
        - system-tests-node-modules-install
  - npm-vite-dev-server:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-vite-plugin-cypress-esm:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-webpack-preprocessor:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-webpack-batteries-included-preprocessor:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-vue:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-puppeteer-unit-tests:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-puppeteer-cypress-tests:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-react:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-angular:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-angular-zoneless:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-mount-utils:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-grep:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-eslint-plugin-dev:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - npm-cypress-schematic:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - v8-integration-tests:
      requires:
        - system-tests-node-modules-install

  - create-and-trigger-packaging-artifacts:
      context:
        - test-runner:upload
        - test-runner:build-binary
        - publish-binary
      requires:
        - node_modules_install
        - internal-pr-build
      filters:
        branches:
          ignore: /^pull\/[0-9]+/
  - wait-for-binary-publish:
      type: approval
      requires:
        - create-and-trigger-packaging-artifacts
  - get-published-artifacts:
      context:
        - publish-binary
        - test-runner:commit-status-checks
      requires:
        - wait-for-binary-publish
  - test-kitchensink:
      requires:
        - internal-pr-build
        - external-pr-build
        - approve-contributor-pr
  - test-npm-module-on-minimum-node-version:
      context: publish-binary
      requires:
        - get-published-artifacts
  - test-types-cypress-and-jest:
      context: publish-binary
      requires:
        - get-published-artifacts
  - test-full-typescript-project:
      context: publish-binary
      requires:
        - get-published-artifacts
  - test-binary-against-kitchensink:
      context: publish-binary
      requires:
        - get-published-artifacts
  - test-binary-as-specific-user:
      name: "test binary as a non-root user"
      executor: non-root-docker-user
      context: publish-binary
      requires:
        - get-published-artifacts
  - test-binary-as-specific-user:
      name: "test binary as a root user"
      context: publish-binary
      requires:
        - get-published-artifacts
  - binary-system-tests:
      context: publish-binary
      requires:
        - get-published-artifacts
        - system-tests-node-modules-install
  - yarn-pnp-preprocessor-system-test:
      context: publish-binary
      requires:
        - get-published-artifacts
        - system-tests-node-modules-install
  - svelte-webpack-system-test:
      context: publish-binary
      requires:
        - get-published-artifacts
        - system-tests-node-modules-install

  # Finalization jobs
  - percy-finalize:
      context: test-runner:percy
      required_env_var: PERCY_TOKEN
      requires:
        - cli-visual-tests
        - reporter-integration-tests
        - run-app-component-tests-chrome
        - run-app-integration-tests-chrome
        - run-frontend-shared-component-tests-chrome
        - run-launchpad-component-tests-chrome
        - run-launchpad-integration-tests-chrome
        - run-reporter-component-tests-chrome
        - run-webpack-dev-server-integration-tests
        - run-vite-dev-server-integration-tests
  # Cypress run must be completed to fetch Accessibility report
  - verify-accessibility-results:
      context: test-runner:cypress-record-key
      requires:
        - reporter-integration-tests
        - run-app-component-tests-chrome
        - run-app-integration-tests-chrome
        - run-frontend-shared-component-tests-chrome
        - run-launchpad-component-tests-chrome
        - run-launchpad-integration-tests-chrome
        - run-reporter-component-tests-chrome
        - run-webpack-dev-server-integration-tests
        - run-vite-dev-server-integration-tests
        - driver-integration-tests-firefox
        - driver-integration-tests-chrome
        - driver-integration-tests-chrome-inject-document-domain
        - driver-integration-tests-chrome-beta-inject-document-domain
        - driver-integration-tests-electron
        - driver-integration-tests-webkit
        - driver-integration-memory-tests

  # Fan-in aggregator — the only required GitHub status check for PRs.
  # All jobs in this workflow fan into this one. Jobs that halt early
  # (because their pipeline parameter is false) still complete successfully,
  # so this job runs once all included jobs finish.
  - all-jobs-passed:
      requires:
        # Always-run jobs
        - linux-lint
        - check-ts
        - health-check
        - lint-types
        - test-kitchensink
        # Conditional jobs (halt early when not needed)
        - cli-visual-tests
        - unit-tests
        - server-unit-tests
        - server-integration-tests
        - server-performance-tests
        - system-tests-chrome
        - system-tests-electron
        - system-tests-firefox
        - system-tests-webkit
        - system-tests-non-root
        - driver-integration-tests-chrome
        - driver-integration-tests-chrome-inject-document-domain
        - driver-integration-tests-chrome-beta
        - driver-integration-tests-chrome-beta-inject-document-domain
        - driver-integration-tests-firefox
        - driver-integration-tests-electron
        - driver-integration-tests-webkit
        - driver-integration-memory-tests
        - run-frontend-shared-component-tests-chrome
        - run-launchpad-integration-tests-chrome
        - run-launchpad-component-tests-chrome
        - run-app-integration-tests-chrome
        - run-app-component-tests-chrome
        - run-reporter-component-tests-chrome
        - reporter-integration-tests
        - run-webpack-dev-server-integration-tests
        - run-vite-dev-server-integration-tests
        - npm-webpack-dev-server
        - npm-vite-dev-server
        - npm-vite-plugin-cypress-esm
        - npm-webpack-preprocessor
        - npm-webpack-batteries-included-preprocessor
        - npm-vue
        - npm-puppeteer-unit-tests
        - npm-puppeteer-cypress-tests
        - npm-react
        - npm-angular
        - npm-angular-zoneless
        - npm-mount-utils
        - npm-grep
        - npm-eslint-plugin-dev
        - npm-cypress-schematic
        - v8-integration-tests
